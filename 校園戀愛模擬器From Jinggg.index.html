<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人物適配戀愛模擬器</title>
  <!-- 導入 Tailwind CSS 帶來精美外觀 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 導入 FontAwesome 圖標 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 自訂平滑動畫與愛心跳動 */
    @keyframes heartBeat {
      0% { transform: scale(1); }
      14% { transform: scale(1.1); }
      28% { transform: scale(1); }
      42% { transform: scale(1.1); }
      70% { transform: scale(1); }
    }
    .animate-heart-beat {
      animation: heartBeat 1.5s infinite;
    }
    /* 隱藏滾動條但保留功能 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(243, 244, 246, 0.5);
      border-radius: 99px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(244, 114, 182, 0.4);
      border-radius: 99px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(244, 114, 182, 0.6);
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-indigo-50 font-sans text-gray-800 p-4 md:p-8">

  <div class="max-w-5xl mx-auto">
    <!-- 標題欄 -->
    <header class="mb-8 text-center space-y-3">
      <div class="inline-flex items-center justify-center p-3 bg-white rounded-full shadow-md mb-2">
        <i class="fa-solid fa-heart text-pink-500 text-4xl animate-heart-beat"></i>
      </div>
      <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600">
        人物適配戀愛模擬器
      </h1>
      <p class="text-gray-500 max-w-2xl mx-auto text-sm md:text-base">
        建立專屬角色庫，賦予他們獨特的個性，並透過先進 AI 分析他們的靈魂契合度！
      </p>
    </header>

    <!-- 主要區塊：左右分欄 -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <!-- 左側欄：角色建立與角色池 -->
      <div class="lg:col-span-5 space-y-6">
        
        <!-- 卡片一：創造新角色 -->
        <div class="bg-white/80 backdrop-blur-sm p-6 rounded-2xl shadow-xl border border-white/50">
          <h2 class="text-xl font-bold mb-4 text-gray-700 flex items-center">
            <i class="fa-solid fa-user-plus mr-2 text-pink-500"></i>創造新角色
          </h2>
          
          <div class="space-y-4">
            <!-- 名字輸入 -->
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">角色名字</label>
              <input
                type="text"
                id="char-name"
                placeholder="例如：小明、雷姆、大雄..."
                class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-400 bg-white"
              />
            </div>
            
            <!-- 個性輸入 -->
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">新增個性特質（無限制數量）</label>
              <div class="flex space-x-2">
                <input
                  type="text"
                  id="trait-input"
                  placeholder="例如：傲嬌、溫柔、愛生氣..."
                  class="flex-1 px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-400 bg-white"
                  onkeydown="if(event.key === 'Enter') addTraitFromInput()"
                />
                <button
                  onclick="addTraitFromInput()"
                  class="px-4 py-2 bg-pink-100 text-pink-600 rounded-xl hover:bg-pink-200 transition-colors font-semibold"
                >
                  新增
                </button>
              </div>
            </div>

            <!-- 當前暫存的個性列表 -->
            <div id="temp-traits-container" class="flex flex-wrap gap-2 min-h-[45px] p-3 bg-gray-50 rounded-xl border border-gray-100">
              <span class="text-xs text-gray-400 italic">尚未輸入個性...</span>
            </div>

            <!-- 錯誤警告顯示 -->
            <div id="error-msg" class="hidden text-sm text-red-500 bg-red-50 p-2.5 rounded-xl text-center border border-red-100"></div>

            <!-- 存檔按鈕 -->
            <button
              onclick="saveCharacter()"
              class="w-full py-3 bg-gradient-to-r from-pink-500 to-purple-500 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all"
            >
              加入角色池
            </button>
          </div>
        </div>

        <!-- 卡片二：角色池 -->
        <div class="bg-white/80 backdrop-blur-sm p-6 rounded-2xl shadow-xl border border-white/50">
          <h2 class="text-xl font-bold mb-4 text-gray-700 flex items-center justify-between">
            <span class="flex items-center">
              <i class="fa-solid fa-users mr-2 text-purple-500"></i>當前角色池
            </span>
            <span id="char-count" class="text-sm bg-purple-100 text-purple-700 px-2.5 py-0.5 rounded-full font-bold">0</span>
          </h2>
          
          <div id="characters-list" class="space-y-3 max-h-[300px] overflow-y-auto custom-scrollbar pr-1">
            <!-- 動態插入角色 -->
          </div>
        </div>

      </div>

      <!-- 右側欄：適配度計算與大師分析 -->
      <div class="lg:col-span-7 space-y-6">
        
        <!-- 計算卡片 -->
        <div class="bg-white/90 backdrop-blur-md p-6 sm:p-8 rounded-3xl shadow-2xl border border-white/50">
          <h2 class="text-2xl font-bold mb-8 text-center text-gray-800 flex items-center justify-center">
            <i class="fa-solid fa-wand-magic-sparkles text-yellow-500 mr-2"></i>
            靈魂適配度檢定
            <i class="fa-solid fa-wand-magic-sparkles text-yellow-500 ml-2"></i>
          </h2>

          <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-8">
            <!-- 角色 A -->
            <div class="w-full sm:w-2/5">
              <label class="block text-sm font-bold text-pink-500 mb-2 text-center">角色 A</label>
              <div class="relative">
                <select
                  id="select-char-1"
                  onchange="updateCharPreview(1)"
                  class="w-full appearance-none px-4 py-3 rounded-2xl border-2 border-pink-200 bg-pink-50/50 focus:outline-none focus:border-pink-500 text-gray-700 font-medium cursor-pointer"
                >
                  <option value="">選擇角色...</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
              </div>
              <div id="preview-traits-1" class="mt-3 text-center text-xs text-gray-500 h-10 overflow-hidden text-ellipsis"></div>
            </div>

            <!-- 愛心裝飾 -->
            <div class="w-full sm:w-1/5 flex justify-center py-4 sm:py-0">
              <div class="bg-gradient-to-br from-pink-100 to-purple-100 rounded-full p-4 shadow-inner">
                <i id="calc-heart" class="fa-solid fa-heart text-pink-400 text-2xl"></i>
              </div>
            </div>

            <!-- 角色 B -->
            <div class="w-full sm:w-2/5">
              <label class="block text-sm font-bold text-purple-500 mb-2 text-center">角色 B</label>
              <div class="relative">
                <select
                  id="select-char-2"
                  onchange="updateCharPreview(2)"
                  class="w-full appearance-none px-4 py-3 rounded-2xl border-2 border-purple-200 bg-purple-50/50 focus:outline-none focus:border-purple-500 text-gray-700 font-medium cursor-pointer"
                >
                  <option value="">選擇角色...</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
              </div>
              <div id="preview-traits-2" class="mt-3 text-center text-xs text-gray-500 h-10 overflow-hidden text-ellipsis"></div>
            </div>
          </div>

          <!-- 計算按鈕 -->
          <div class="text-center">
            <button
              id="btn-calculate"
              onclick="startMatchmaking()"
              class="px-8 py-4 bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 text-white font-bold text-lg rounded-2xl shadow-xl hover:shadow-2xl transform hover:-translate-y-1 transition-all w-full sm:w-auto min-w-[200px]"
            >
              開始計算適配度
            </button>
          </div>
        </div>

        <!-- 結果卡片 (預設隱藏) -->
        <div id="result-card" class="hidden bg-white p-8 rounded-3xl shadow-2xl border-2 border-pink-100 animate-fade-in">
          <div class="text-center mb-6">
            <h3 class="text-lg font-semibold text-gray-500 mb-2">最終契合指數</h3>
            <div class="flex items-center justify-center space-x-1">
              <span id="result-score" class="text-6xl md:text-8xl font-black text-pink-500 tracking-tighter drop-shadow-md">88</span>
              <span class="text-4xl font-bold text-pink-500">%</span>
            </div>
            <!-- 進度條 -->
            <div class="w-full max-w-md mx-auto mt-6 bg-gray-100 rounded-full h-4 overflow-hidden shadow-inner">
              <div id="result-progress" class="h-full bg-gradient-to-r from-pink-400 to-purple-500 rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>
          </div>

          <!-- 說明 -->
          <div class="bg-pink-50/50 p-6 rounded-2xl border border-pink-100">
            <h4 class="text-pink-600 font-bold mb-3 flex items-center">
              <i class="fa-solid fa-sparkles mr-2 text-yellow-500"></i>大師深度分析
            </h4>
            <p id="result-reason" class="text-gray-700 leading-relaxed text-justify whitespace-pre-wrap"></p>
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- 刪除確認 Modal 彈窗 -->
  <div id="delete-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl p-6 md:p-8 max-w-md w-full shadow-2xl text-center">
      <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-trash-can text-2xl"></i>
      </div>
      <h3 class="text-xl font-bold text-gray-900 mb-2">確定要刪除此角色嗎？</h3>
      <p class="text-gray-600 mb-6 text-sm">此動作將從您的角色庫中永久移除「<span id="delete-char-name" class="font-bold text-red-500"></span>」，無法復原。</p>
      <div class="flex space-x-3">
        <button onclick="closeDeleteModal()" class="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-2xl">取消</button>
        <button id="btn-confirm-delete" class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-2xl shadow-lg">確認刪除</button>
      </div>
    </div>
  </div>

  <script>
    // --- 狀態管理 ---
    const apiKey = ""; // API 密鑰由環境自動注入
    let characters = [];
    let currentTraits = [];
    let deleteTargetId = null;

    // --- 初始化載入 ---
    window.onload = function() {
      const saved = localStorage.getItem('love_sim_chars');
      if (saved) {
        try {
          characters = JSON.parse(saved);
        } catch (e) {
          characters = [];
        }
      }
      render();
    };

    // --- 畫面渲染渲染 ---
    function render() {
      // 1. 更新角色清單
      const listContainer = document.getElementById('characters-list');
      const countLabel = document.getElementById('char-count');
      countLabel.textContent = characters.length;

      if (characters.length === 0) {
        listContainer.innerHTML = `<p class="text-gray-400 text-center py-8 text-sm">目前還沒有角色，趕快在上方創造吧！</p>`;
      } else {
        listContainer.innerHTML = '';
        characters.forEach(char => {
          const charEl = document.createElement('div');
          charEl.className = "p-3 bg-white rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition-all flex justify-between items-start group";
          
          const traitsBadges = char.traits.map(t => `<span class="text-xs px-2 py-0.5 bg-gray-100 text-gray-600 rounded-md">${t}</span>`).join(' ');

          charEl.innerHTML = `
            <div class="flex-1 mr-2">
              <div class="font-bold text-gray-800">${char.name}</div>
              <div class="flex flex-wrap gap-1 mt-2">${traitsBadges}</div>
            </div>
            <button onclick="openDeleteModal('${char.id}', '${char.name}')" class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors md:opacity-0 group-hover:opacity-100 focus:opacity-100">
              <i class="fa-solid fa-trash-can text-sm"></i>
            </button>
          `;
          listContainer.appendChild(charEl);
        });
      }

      // 2. 更新下拉選單
      const select1 = document.getElementById('select-char-1');
      const select2 = document.getElementById('select-char-2');
      const val1 = select1.value;
      const val2 = select2.value;

      const optionsHtml = `<option value="">選擇角色...</option>` + characters.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      
      select1.innerHTML = optionsHtml;
      select2.innerHTML = optionsHtml;

      // 恢復原本選中的項目（如果還存在的話）
      if (characters.some(c => c.id === val1)) select1.value = val1;
      if (characters.some(c => c.id === val2)) select2.value = val2;

      updateCharPreview(1);
      updateCharPreview(2);

      // 3. 儲存至本地
      localStorage.setItem('love_sim_chars', JSON.stringify(characters));
    }

    // --- 新增角色流程 ---
    function addTraitFromInput() {
      const input = document.getElementById('trait-input');
      const value = input.value.trim();
      const errorMsg = document.getElementById('error-msg');
      errorMsg.classList.add('hidden');

      if (!value) return;

      if (currentTraits.includes(value)) {
        showError("此個性特質已經存在囉！");
        return;
      }

      currentTraits.push(value);
      input.value = '';
      renderTempTraits();
    }

    function renderTempTraits() {
      const container = document.getElementById('temp-traits-container');
      if (currentTraits.length === 0) {
        container.innerHTML = `<span class="text-xs text-gray-400 italic">尚未輸入個性...</span>`;
        return;
      }

      container.innerHTML = currentTraits.map((t, idx) => `
        <span class="inline-flex items-center px-3 py-1 rounded-full text-sm bg-purple-100 text-purple-700">
          ${t}
          <button onclick="removeTempTrait(${idx})" class="ml-2 hover:text-purple-950 focus:outline-none">
            <i class="fa-solid fa-xmark text-xs"></i>
          </button>
        </span>
      `).join('');
    }

    function removeTempTrait(idx) {
      currentTraits.splice(idx, 1);
      renderTempTraits();
    }

    function saveCharacter() {
      const nameInput = document.getElementById('char-name');
      const name = nameInput.value.trim();

      if (!name) {
        showError("請先輸入角色名字唷！");
        return;
      }
      if (currentTraits.length === 0) {
        showError("請至少為角色新增一個個性特質！");
        return;
      }

      const newChar = {
        id: Date.now().toString() + Math.random().toString(36).substring(2, 9),
        name: name,
        traits: [...currentTraits]
      };

      characters.unshift(newChar);
      
      // 重設輸入狀態
      nameInput.value = '';
      currentTraits = [];
      renderTempTraits();
      hideError();
      render();
    }

    function showError(text) {
      const errorMsg = document.getElementById('error-msg');
      errorMsg.textContent = text;
      errorMsg.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('error-msg').classList.add('hidden');
    }

    // --- 刪除角色流程 ---
    function openDeleteModal(id, name) {
      deleteTargetId = id;
      document.getElementById('delete-char-name').textContent = name;
      document.getElementById('delete-modal').classList.remove('hidden');
      
      document.getElementById('btn-confirm-delete').onclick = function() {
        characters = characters.filter(c => c.id !== deleteTargetId);
        
        // 檢查配對框是否需要清空
        const select1 = document.getElementById('select-char-1');
        const select2 = document.getElementById('select-char-2');
        if (select1.value === deleteTargetId) select1.value = '';
        if (select2.value === deleteTargetId) select2.value = '';

        closeDeleteModal();
        render();
      };
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.add('hidden');
      deleteTargetId = null;
    }

    // --- 下拉預覽 ---
    function updateCharPreview(slot) {
      const select = document.getElementById(`select-char-${slot}`);
      const preview = document.getElementById(`preview-traits-${slot}`);
      const selectedId = select.value;

      if (!selectedId) {
        preview.textContent = '';
        return;
      }

      const char = characters.find(c => c.id === selectedId);
      if (char) {
        preview.textContent = "特性：" + char.traits.join('、');
      }
    }

    // --- AI 契合度檢測 (Gemini API) ---
    async function startMatchmaking() {
      const charId1 = document.getElementById('select-char-1').value;
      const charId2 = document.getElementById('select-char-2').value;

      if (!charId1 || !charId2) {
        alert("請先選擇兩位角色進行適配檢定！");
        return;
      }

      if (charId1 === charId2) {
        showResults(100, "自戀是浪漫的最高境界！與自己相處完美契合 100%，不過若要尋找伴侶，建議選擇兩位不同的角色進行配對喔！");
        return;
      }

      const char1 = characters.find(c => c.id === charId1);
      const char2 = characters.find(c => c.id === charId2);

      const btn = document.getElementById('btn-calculate');
      const heart = document.getElementById('calc-heart');
      
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-2"></i> AI 深度分析中...`;
      heart.classList.add('animate-heart-beat', 'text-pink-600');

      // 隱藏舊結果
      document.getElementById('result-card').classList.add('hidden');

      try {
        const prompt = `
          你現在是一位專業的心理學家兼戀愛大師。請以「繁體中文」詳細分析以下兩位角色的戀愛適配度。
          角色 A：${char1.name} (個性特質：${char1.traits.join('、')})
          角色 B：${char2.name} (個性特質：${char2.traits.join('、')})
          
          請綜合心理學、性格互補與相似性等層面進行真實、深入且具趣味性的分析。
          以 JSON 格式回傳，必須包含兩個欄位：
          1. "score": 一個 0 到 100 的整數，代表他們的適配度百分比。
          2. "reason": 一段詳細的文字說明，解釋為何給出這個分數、他們可能遇到的挑戰、以及為何互相吸引。
        `;

        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                score: { type: "INTEGER" },
                reason: { type: "STRING" }
              },
              required: ["score", "reason"]
            }
          }
        };

        // 指數退避重試
        const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
          for (let i = 0; i < retries; i++) {
            try {
              const res = await fetch(url, options);
              if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
              return await res.json();
            } catch (e) {
              if (i === retries - 1) throw e;
              await new Promise(res => setTimeout(res, delay * Math.pow(2, i)));
            }
          }
        };

        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const data = await fetchWithRetry(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (responseText) {
          const result = JSON.parse(responseText);
          showResults(result.score, result.reason);
        } else {
          throw new Error("無效的 API 回應格式");
        }
      } catch (err) {
        console.error("AI 運算失敗:", err);
        showResults(0, "哎呀！大宇宙戀愛電波受到干擾。請檢查網路狀態，並再試一次！");
      } finally {
        btn.disabled = false;
        btn.textContent = "開始計算適配度";
        heart.classList.remove('animate-heart-beat', 'text-pink-600');
      }
    }

    function showResults(score, reason) {
      const card = document.getElementById('result-card');
      const scoreTxt = document.getElementById('result-score');
      const bar = document.getElementById('result-progress');
      const reasonTxt = document.getElementById('result-reason');

      // 依分數決定色彩
      scoreTxt.className = "text-6xl md:text-8xl font-black tracking-tighter drop-shadow-md transition-all duration-300";
      if (score >= 80) {
        scoreTxt.classList.add('text-pink-500');
      } else if (score >= 50) {
        scoreTxt.classList.add('text-purple-500');
      } else {
        scoreTxt.classList.add('text-indigo-500');
      }

      scoreTxt.textContent = score;
      reasonTxt.textContent = reason;
      card.classList.remove('hidden');

      // 延遲動畫使進度條有加載感
      setTimeout(() => {
        bar.style.width = `${score}%`;
      }, 100);
    }
  </script>
</body>
</html>
